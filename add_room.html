{% extends "base.html" %}
{% block title %}Add Room{% endblock %}
{% block crumb %}Rooms{% endblock %}
{% block heading %}Add room{% endblock %}
{% block content %}
<div class="regcard">
    <div class="regcard-head">
        <span>Room registration</span>
        <span class="tag">New entry</span>
    </div>
    <div class="regcard-body">
        <form method="POST">
            <div class="field">
                <label for="roomid">Room ID</label>
                <input id="roomid" type="text" name="roomid" required>
            </div>
            <div class="field">
                <label for="roomtype">Room type</label>
                <input id="roomtype" type="text" name="roomtype" required>
                <div class="hint">Must be unique — this is how bookings find the right rate.</div>
            </div>
            <div class="field">
                <label for="totalnoofrooms">Rooms of this type</label>
                <input id="totalnoofrooms" type="number" name="totalnoofrooms" required>
            </div>
            <div class="field">
                <label for="charges">Charge per night (₹)</label>
                <input id="charges" type="number" name="charges" required>
            </div>
            <div class="form-actions">
                <button type="submit" class="btn btn-brass">Save room</button>
                <a href="{{ url_for('list_rooms') }}" class="link-cancel">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
