{% extends "base.html" %}
{% block title %}Cancel Booking{% endblock %}
{% block crumb %}Cancellations{% endblock %}
{% block heading %}Cancel a booking{% endblock %}
{% block content %}
<div class="regcard">
    <div class="regcard-head">
        <span>Cancellation notice</span>
        <span class="tag">Removes booking</span>
    </div>
    <div class="regcard-body">
        <form method="POST">
            <div class="field">
                <label for="customerid">Customer ID</label>
                <input id="customerid" type="text" name="customerid" required>
            </div>
            <div class="field">
                <label for="dateofcancellation">Date of cancellation</label>
                <input id="dateofcancellation" type="date" name="dateofcancellation" required>
            </div>
            <div class="form-actions">
                <button type="submit" class="btn btn-danger">Cancel booking</button>
                <a href="{{ url_for('list_cancellations') }}" class="link-cancel">Back</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
